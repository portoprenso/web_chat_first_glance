services:
  postgres:
    image: postgres:16-alpine
    container_name: first-glance-postgres
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d chat_app']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - "${POSTGRES_DATA_DIR:-./.docker-data/postgres}:/var/lib/postgresql/data"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: first-glance-backend
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "yarn install && yarn prisma:generate && yarn prisma:deploy && yarn dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_app?schema=public
      FRONTEND_ORIGIN: http://localhost:8080
      JWT_ACCESS_SECRET: development-only-contract-generation-secret-1234
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 14
      REFRESH_COOKIE_NAME: chat_refresh_token
      STORAGE_DIR: /app/storage-data
      MAX_UPLOAD_BYTES: 10485760
      SWAGGER_ENABLED: 'true'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - "${BACKEND_STORAGE_HOST_DIR:-./.docker-data/storage}:/app/storage-data"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: first-glance-frontend
    depends_on:
      - backend
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    image: nginx:alpine
    container_name: first-glance-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - '8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend_node_modules:
  frontend_node_modules:
