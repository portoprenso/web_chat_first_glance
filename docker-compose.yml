services:
  postgres:
    image: postgres:16-alpine
    container_name: first-glance-postgres
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d chat_app']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: first-glance-backend
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "yarn install && yarn prisma:generate && yarn prisma:deploy && yarn dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_app?schema=public
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: development-only-contract-generation-secret-1234
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 14
      REFRESH_COOKIE_NAME: chat_refresh_token
      STORAGE_DIR: /app/storage-data
      MAX_UPLOAD_BYTES: 10485760
      SWAGGER_ENABLED: 'true'
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_storage:/app/storage-data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: first-glance-frontend
    depends_on:
      - backend
    command: sh -c "yarn install && yarn dev"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000/ws
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  backend_storage:
